name: Update home page stats

# Refreshes _data/stats.yml with the latest stats from every configured
# source (PowerShell Gallery, Cloudflare) so project cards on the home
# page show up-to-date install / pageview numbers.
#
# The actual fetching/formatting lives in scripts/update-stats.py and the
# per-source modules under scripts/lib/. To track a different package or
# site, edit lib/psgallery.py or lib/cloudflare.py.
#
# Required repo secret:
#   CLOUDFLARE_API_TOKEN  Cloudflare API token, scope Zone:Analytics:Read.
#                         If absent, the cloudflare: section is skipped
#                         silently and only PSGallery stats refresh.

on:
  schedule:
    # Daily at 03:00 UTC. Off-peak for both upstream APIs and GH Actions.
    - cron: "0 3 * * *"
  workflow_dispatch: {}
  push:
    # Re-run automatically when the updater code changes, so a PR that
    # adds a new tracked source refreshes stats on merge.
    branches: [master]
    paths:
      - "scripts/update-stats.py"
      - "scripts/lib/**"
      - ".github/workflows/update-stats.yml"

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch stats
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python3 scripts/update-stats.py

      - name: Commit changes
        run: |
          set -euo pipefail
          if git diff --quiet -- _data/stats.yml; then
            echo "No changes to _data/stats.yml; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/stats.yml
          git commit -m "chore(stats): refresh home page stats"
          git push
